name: Moloni -> ntfy

on:
  workflow_dispatch:
    inputs:
      max_runtime:
        description: "Segundos a correr antes de relancar (para testes, usa um valor baixo, ex. 90)"
        required: false
        default: "19800"
  schedule:
    # Rede de seguranca: ignicao de manha + recuperacao se a corrente quebrar.
    # O GitHub descarta muitas destas execucoes; basta UMA pegar. A cadencia real
    # (de 2 em 2 min) vem do poller continuo + auto-relancamento, nao daqui.
    - cron: "*/10 8-20 * * *"

# Garante um unico poller a correr de cada vez.
concurrency:
  group: moloni-poller
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Marcar início do job
        run: date +%s > "$RUNNER_TEMP/job_start"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests python-dotenv tzdata

      - name: Restaurar estado
        uses: actions/cache/restore@v4
        with:
          path: data
          key: moloni-state-${{ github.run_id }}
          restore-keys: |
            moloni-state-

      - name: Poller contínuo (modo run)
        env:
          MOLONI_CLIENT_ID: ${{ secrets.MOLONI_CLIENT_ID }}
          MOLONI_CLIENT_SECRET: ${{ secrets.MOLONI_CLIENT_SECRET }}
          MOLONI_USERNAME: ${{ secrets.MOLONI_USERNAME }}
          MOLONI_PASSWORD: ${{ secrets.MOLONI_PASSWORD }}
          MOLONI_COMPANY_ID: ${{ secrets.MOLONI_COMPANY_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ vars.NTFY_SERVER || 'https://ntfy.sh' }}
          NTFY_PRIORITY: high
          MOLONI_STATUS: "1"
          STATE_FILE: data/state.json
          ACTIVE_START: "10:00"
          ACTIVE_END: "20:30"
          ACTIVE_TZ: Europe/Lisbon
          SUMMARY_TIME: "20:30"
          DAILY_GOAL: "4200"
          SUMMARY_SALESMEN: "Reshma,Pajo,Rodrigo,Izadora"
          POLL_INTERVAL_SECONDS: "120"
          # ~5,5h por job (limite do GitHub é 6h); depois relança o seguinte.
          MAX_RUNTIME_SECONDS: ${{ github.event.inputs.max_runtime || '19800' }}
        run: python moloni_ntfy.py run

      - name: Guardar estado
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: moloni-state-${{ github.run_id }}

      - name: Relançar a corrente (24/7)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Sem DISPATCH_TOKEN: a corrente nao se relanca; fica so o schedule."
            exit 0
          fi
          START=$(cat "$RUNNER_TEMP/job_start" 2>/dev/null || echo 0)
          ELAPSED=$(( $(date +%s) - START ))
          # Anti-runaway: so relanca se correu o tempo normal (>=300s). Falhas
          # rapidas (ex.: infra) nao relancam -> recuperacao fica para o schedule.
          if [ "$START" -eq 0 ] || [ "$ELAPSED" -lt 300 ]; then
            echo "Job durou ${ELAPSED}s (<300s); nao relanco (o schedule recupera)."
            exit 0
          fi
          gh workflow run notify.yml --ref main && echo "Corrente relancada (apos ${ELAPSED}s)."
